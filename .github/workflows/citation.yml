name: Validate Citation

on:
  push:
    paths:
      - 'CITATION.cff'
  pull_request:
    paths:
      - 'CITATION.cff'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: citation-file-format/cffconvert-github-action@2.0.0
        with:
          args: --validate
