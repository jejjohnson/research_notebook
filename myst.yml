version: 1
project:
  title: Research Notebook
  authors:
    - name: Juan Emmanuel Johnson
  bibliography:
    - references.bib
  toc:
    - file: docs/index
    - title: Notes
      children:
        - file: docs/notes/background
        - file: docs/notes/methods
    - title: Tutorials
      children:
        - file: docs/tutorials/getting_started
