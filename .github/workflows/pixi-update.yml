name: Pixi Update

on:
  schedule:
    - cron: '0 6 1 * *'  # First day of every month at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: false
      - name: Update pixi lockfile
        run: pixi update
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update pixi lockfile'
          title: 'chore: update pixi lockfile'
          body: 'Automated monthly pixi lockfile update.'
          branch: chore/pixi-update
