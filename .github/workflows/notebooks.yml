name: Validate Notebooks

on:
  pull_request:
    paths:
      - 'notebooks/**'
      - 'docs/**/*.ipynb'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          cache: true
          frozen: true
      - name: Validate .ipynb files with nbformat
        run: |
          pixi run -e jupyterlab python - <<'PY'
          import pathlib, sys, nbformat
          failed = []
          for nb in list(pathlib.Path("notebooks").rglob("*.ipynb")) + list(
              pathlib.Path("docs").rglob("*.ipynb")
          ):
              try:
                  nbformat.validate(nbformat.read(nb, as_version=4))
                  print(f"OK  {nb}")
              except Exception as exc:
                  print(f"FAIL {nb}: {exc}", file=sys.stderr)
                  failed.append(nb)
          sys.exit(1 if failed else 0)
          PY
