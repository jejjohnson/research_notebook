[project]
name = "research_notebook"
version = "0.1.0"
description = "A scientific research project template"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.12"
numpy = "*"
scipy = "*"
xarray = "*"
netcdf4 = "*"
matplotlib = "*"
dvc = ">=3"
hydra-core = ">=1.3"

[pypi-dependencies]
research_notebook = { path = ".", editable = true }
hydra-zen = ">=0.13"
omegaconf = ">=2.3"

[feature.dev.dependencies]
pytest = ">=8"
pytest-cov = ">=5"
pre-commit = ">=3.7"
ruff = ">=0.9"
jupytext = ">=1.16"

[feature.dev.pypi-dependencies]
ty = ">=0.0.1a6"

[feature.docs.dependencies]
nodejs = ">=18"

[feature.docs.pypi-dependencies]
mystmd = "*"

[feature.jupyterlab.dependencies]
jupyterlab = ">=4"
ipykernel = ">=6.29"
jupyterlab-git = "*"
jupyterlab-lsp = "*"
jupyter-lsp = "*"
python-lsp-server = "*"
jupyterlab-myst = "*"
ipywidgets = ">=8"
nbdime = "*"

[feature.jupyterlab.pypi-dependencies]
jupyterlab-code-formatter = "*"
jupyterlab-spellchecker = "*"

[feature.marimo.dependencies]
marimo = "*"
duckdb = ">=1"
altair = ">=5"
polars = ">=1"
pyarrow = "*"
anywidget = "*"

[feature.marimo.pypi-dependencies]
vegafusion = {version = ">=2", extras = ["embed"]}
plotly = ">=5"

# ---------------------------------------------------------------------------
# Showcase env: pyrox
# Pulls pyrox from its git main + the [colab] and [optax] extras so every
# notebook under notebooks/pyrox/ can be re-executed end-to-end.
# ---------------------------------------------------------------------------
[feature.pyrox.dependencies]
python = "3.12.*"
ipykernel = ">=6.29"
jupyter = "*"
nbconvert = "*"

[feature.pyrox.pypi-dependencies]
pyrox = { git = "https://github.com/jejjohnson/pyrox", branch = "main", extras = ["colab", "optax"] }
# numpyro 0.20.1 declares `jax>=0.7` but its ops/provenance.py still imports
# `xla_pmap_p`, which JAX removed at the 0.9 line. Clamp below 0.9 so the
# resolver picks a version whose API matches numpyro's code. Drop this pin
# once numpyro ≥0.21 (with the updated import) lands on PyPI.
jax = ">=0.7,<0.9"
jaxlib = ">=0.7,<0.9"

[feature.pyrox.tasks]
execute-pyrox = "jupyter nbconvert --to notebook --execute --inplace notebooks/pyrox/*.ipynb --ExecutePreprocessor.timeout=600"

[environments]
default = { features = ["dev"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
jupyterlab = { features = ["dev", "jupyterlab"], solve-group = "default" }
marimo = { features = ["dev", "marimo"], solve-group = "default" }
pyrox = { features = ["pyrox"], solve-group = "pyrox" }

[tasks]
test = "pytest -v"
lint = "ruff check src/"
format = "ruff format src/"
typecheck = "ty check src/"
precommit = "pre-commit run --all-files"
train = "python scripts/train.py"
train-zen = "python scripts/train_zen.py"
evaluate = "python scripts/evaluate.py"
preprocess = "python scripts/preprocess.py"

[feature.docs.tasks]
docs-serve = "myst start"
docs-build = "myst build --html"

[feature.jupyterlab.tasks]
lab = "jupyter lab"

[feature.marimo.tasks]
marimo-edit = "marimo edit"
