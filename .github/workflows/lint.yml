name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          cache: true
          frozen: true
      - name: Run linter
        run: pixi run lint
